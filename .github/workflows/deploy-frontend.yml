name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/**'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'packages/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_ENV: ${{ github.event_name == 'push' && 'production' || 'preview' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./apps/web

      - name: Type check
        run: npx tsc --noEmit
        working-directory: ./apps/web

      # Deployment only runs once the Vercel secrets are configured. Until then
      # the steps below skip cleanly so PRs aren't blocked on missing creds.
      - name: Check Vercel credentials
        id: vercel_check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel secrets not set — skipping deploy. Add VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID in repo settings to enable."
          fi

      - name: Install Vercel CLI
        if: steps.vercel_check.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.vercel_check.outputs.configured == 'true'
        run: vercel pull --yes --environment=${{ env.VERCEL_ENV }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./apps/web

      - name: Build project artifacts
        if: steps.vercel_check.outputs.configured == 'true'
        run: vercel build ${{ env.VERCEL_ENV == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./apps/web

      - name: Deploy to Vercel
        if: steps.vercel_check.outputs.configured == 'true'
        run: vercel deploy --prebuilt ${{ env.VERCEL_ENV == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./apps/web
